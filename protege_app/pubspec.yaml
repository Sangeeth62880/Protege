name: protege_app
description: Protégé - AI Learning Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.6
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.2.5
  
  # HTTP
  http: ^1.4.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.5.3
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  file_picker: ^10.3.10

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
